<!DOCTYPE html>
<html lang="en">
<!-- IH-404-1 · 2026-07-22 · branded 404 with legacy Wix-path redirects -->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Intelligent Healthcare</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#132E33">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23132E33'/%3E%3Cpath d='M15 38h9l5-12 7 20 6-14 4 6h8' fill='none' stroke='%23F7F4EE' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script>
/* Old Wix-site paths get sent home instead of stranding the visitor. */
(function(){
  var p = location.pathname.toLowerCase();
  var legacy = ['/about-us','/book-online','/service-page/','/en/','/en'];
  for (var i=0;i<legacy.length;i++){
    if (p === legacy[i] || p.indexOf(legacy[i]) === 0) { location.replace('/'); return; }
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F7F4EE;--ink:#16333A;--ink2:#51696C;--hair2:#C9BFA9;--teal:#0E5E63;--teal-deep:#0A474B;--brick:#A6402A;
        --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;--body:"Public Sans",system-ui,sans-serif;--display:"Fraunces",Georgia,serif}
  *{box-sizing:border-box;margin:0}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;font-size:16.5px;
       min-height:100svh;display:grid;grid-template-rows:auto 1fr;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--teal);color:var(--paper)}
  .wrap{max-width:1104px;margin:0 auto;padding:0 24px;width:100%}
  header{padding:30px 0 0}
  .bar{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;
       padding-bottom:14px;border-bottom:1px solid var(--ink);position:relative}
  .bar::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:1px;background:var(--ink);opacity:.35}
  .wordmark{font-family:var(--display);font-weight:600;font-size:1.28rem;color:var(--ink);text-decoration:none}
  .wordmark i{font-style:normal;color:var(--teal)}
  nav a{font-family:var(--mono);font-size:.78rem;color:var(--ink2);text-decoration:none}
  nav a:hover{color:var(--teal);text-decoration:underline;text-underline-offset:4px}
  main{display:grid;place-items:center;padding:56px 0 80px}
  .card{max-width:34em}
  .code{font-family:var(--mono);font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
        color:var(--brick);display:inline-flex;align-items:center;gap:8px;margin-bottom:18px}
  .code::before{content:"";width:7px;height:7px;background:var(--brick)}
  h1{font-family:var(--display);font-weight:600;font-size:clamp(1.9rem,4vw,2.7rem);line-height:1.1;
     letter-spacing:-.012em;margin-bottom:14px;text-wrap:balance}
  h1 em{font-style:italic;font-weight:500;color:var(--teal)}
  p{color:var(--ink2);margin-bottom:26px}
  .btn{display:inline-block;background:var(--teal);color:#FCFAF5;text-decoration:none;font-weight:600;
       font-size:.98rem;padding:13px 22px;border-radius:5px}
  .btn:hover{background:var(--teal-deep)}
  .alt{font-family:var(--mono);font-size:.85rem;color:var(--ink);text-decoration:none;margin-left:20px;
       border-bottom:1px solid var(--hair2);padding-bottom:3px}
  .alt:hover{color:var(--teal);border-color:var(--teal)}
</style>
</head>
<body>
<header class="wrap">
  <div class="bar">
    <a class="wordmark" href="/">Intelligent<i> Healthcare</i></a>
    <nav><a href="mailto:admin@intelli-healthcare.com">admin@intelli-healthcare.com</a></nav>
  </div>
</header>
<main class="wrap">
  <div class="card">
    <span class="code">404 · Not on file</span>
    <h1>This page isn't in the ledger. <em>The homepage is.</em></h1>
    <p>The page you're looking for doesn't exist — it may belong to an older version of this site.
    Everything current lives on the homepage.</p>
    <a class="btn" href="/">Go to the homepage</a>
    <a class="alt" href="mailto:admin@intelli-healthcare.com">Email us instead</a>
  </div>
</main>
</body>
</html>
